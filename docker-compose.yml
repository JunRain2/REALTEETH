services:
  mysql:
    image: mysql:8.0
    container_name: realteeth-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: realteeth
    ports:
      - "3306:3306"
    volumes:
      - ./src/main/resources/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
